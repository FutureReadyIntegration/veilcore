<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .title { font-size: 54px; font-weight: 800; fill: url(#g); }
      .sub { font-size: 16px; fill: #9fb4c7; opacity: 0.92; }
    </style>
  </defs>

  <rect width="900" height="200" fill="#070b12"/>
  <path d="M0 160 H900" stroke="#0b2a33" stroke-width="2" opacity="0.55"/>

  <text x="450" y="92" text-anchor="middle" class="mono title" filter="url(#glow)">
    VEILCORE
  </text>

  <text x="450" y="142" text-anchor="middle" class="mono sub">
    EVENT-DRIVEN SECURITY IMMUNE SYSTEM • 80 ORGANS • THE VEIL PROTECTS THE CORE
  </text>
</svg>
