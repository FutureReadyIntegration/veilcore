<svg width="820" height="120" viewBox="0 0 820 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="820" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07101d"/>
      <stop offset="100%" stop-color="#0f1b2e"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00ff6a"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #e6f7ff; letter-spacing: 2px; }
      .sub { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #9fc7dd; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="820" height="120" rx="24" fill="url(#bg)" stroke="#1e3a4a" stroke-width="2"/>

  <circle cx="54" cy="60" r="10" fill="#00ff6a" filter="url(#glow)">
    <animate attributeName="opacity" values="0.35;1;0.35" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <text x="84" y="52" class="title">LIVE EVENT STREAM</text>
  <text x="84" y="78" class="sub">/events active • prism connected • event-driven defense online</text>

  <path d="M500 60 H760" stroke="url(#line)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <circle cx="520" cy="60" r="6" fill="#00e5ff">
    <animate attributeName="cx" values="520;740;520" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>
