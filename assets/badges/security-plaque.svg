<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="260" viewBox="0 0 1800 260">
  <defs>
    <linearGradient id="bg2" x1="0" x2="1">
      <stop offset="0" stop-color="#05070c"/>
      <stop offset="1" stop-color="#090616"/>
    </linearGradient>

    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowCyan2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="scan" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M0 26H26" fill="none" stroke="#120b2a" stroke-width="2" opacity="0.55"/>
      <path d="M26 0V26" fill="none" stroke="#120b2a" stroke-width="2" opacity="0.55"/>
    </pattern>
  </defs>

  <rect x="10" y="10" width="1780" height="240" rx="22" fill="url(#bg2)"/>
  <rect x="10" y="10" width="1780" height="240" rx="22" fill="url(#scan)" opacity="0.55"/>
  <rect x="10" y="10" width="1780" height="240" rx="22" fill="none" stroke="#a78bfa" stroke-width="3" opacity="0.95" filter="url(#glowPurple)"/>

  <text x="50" y="68" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace"
        font-size="34" fill="#e6dcff" letter-spacing="1.5" opacity="0.95">
    VEILCORE • SECURITY PLAQUE
  </text>

  <g transform="translate(1292,34)">
    <rect x="0" y="0" width="458" height="54" rx="27" fill="none" stroke="#00e5ff" stroke-width="3" filter="url(#glowCyan2)"/>
    <circle cx="34" cy="27" r="7" fill="#00e5ff" filter="url(#glowCyan2)"/>
    <text x="62" y="35" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace"
          font-size="26" fill="#b7f7ff" letter-spacing="1.2">
      SECURITY: HARDENED
    </text>
  </g>

  <text x="50" y="110" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace"
        font-size="22" fill="#b8a6ff" opacity="0.92">
    privilege boundary closed • resource required for mutators • unknown fails closed
  </text>

  <g transform="translate(60,150)">
    <!-- segmented bar -->
    <rect x="0" y="22" width="1620" height="36" rx="18" fill="#0d0b1c" opacity="0.95"/>
    <rect x="0" y="22" width="640" height="36" rx="18" fill="#0f1530" opacity="0.85"/>
    <rect x="640" y="22" width="520" height="36" fill="#0f1530" opacity="0.55"/>
    <rect x="1160" y="22" width="460" height="36" rx="18" fill="#0f1530" opacity="0.35"/>

    <!-- labels -->
    <text x="40" y="48" font-size="20" fill="#e6dcff"
          font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
      CLASSIFY
    </text>
    <text x="260" y="48" font-size="20" fill="#b7f7ff"
          font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
      REQUIRE RESOURCE
    </text>
    <text x="720" y="48" font-size="20" fill="#b7f7ff"
          font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
      AUTHORIZE
    </text>
    <text x="1210" y="48" font-size="20" fill="#baffd1"
          font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
      EXECUTE
    </text>

    <!-- LEDs -->
    <g transform="translate(1480,6)">
      <text x="0" y="12" font-size="18" fill="#8aa6c6"
            font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">LED</text>
      <circle cx="40" cy="36" r="7" fill="#00ff6a"/>
      <circle cx="64" cy="36" r="7" fill="#fbbf24" opacity="0.8"/>
      <circle cx="88" cy="36" r="7" fill="#ff3b3b" opacity="0.75"/>
    </g>

    <!-- footer -->
    <text x="0" y="96" font-size="20" fill="#8aa6c6"
          font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
      admission → guardian → firewall → organs • policy-bound execution • audit captured
    </text>
  </g>
</svg>
