<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="plaqueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00ffa6"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="5" y="5" width="890" height="170" rx="14"
        fill="#0d1117"
        stroke="url(#plaqueGrad)"
        stroke-width="2"
        filter="url(#glow)"/>

  <text x="50%" y="60" text-anchor="middle"
        fill="#00e5ff"
        font-size="28"
        font-family="monospace"
        font-weight="bold">
    VEIL SECURITY INVARIANT
  </text>

  <text x="50%" y="100" text-anchor="middle"
        fill="#8b949e"
        font-size="18"
        font-family="monospace">
    Authorization decisions must never be inferred.
  </text>

  <text x="50%" y="130" text-anchor="middle"
        fill="#00ffa6"
        font-size="18"
        font-family="monospace">
    Authority must be explicit — or denied.
  </text>

</svg>
