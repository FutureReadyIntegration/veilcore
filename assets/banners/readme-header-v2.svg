<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07101d"/>
      <stop offset="1" stop-color="#0f1b2e"/>
    </linearGradient>
    <radialGradient id="orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 210) rotate(90) scale(170 170)">
      <stop stop-color="#00e5ff" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#07101d" stop-opacity="0"/>
    </radialGradient>
    <style>
      .title { font: 700 70px 'Segoe UI', Arial, sans-serif; fill: #e6f7ff; letter-spacing: 8px; }
      .sub { font: 600 26px 'Segoe UI', Arial, sans-serif; fill: #9fc7dd; letter-spacing: 2px; }
      .tag { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #00e5ff; letter-spacing: 3px; }
      .small { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #7baac4; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1600" height="520" fill="url(#bg)"/>
  <circle cx="800" cy="210" r="170" fill="url(#orb)"/>
  <circle cx="800" cy="210" r="118" stroke="#00e5ff" stroke-opacity="0.55" stroke-width="3"/>
  <circle cx="800" cy="210" r="72" stroke="#fbbf24" stroke-opacity="0.7" stroke-width="3"/>
  <circle cx="800" cy="210" r="26" fill="#0a0e17" stroke="#00e5ff" stroke-width="3"/>

  <text x="800" y="375" text-anchor="middle" class="title">VEILCORE</text>
  <text x="800" y="414" text-anchor="middle" class="sub">THE VEIL PROTECTS THE CORE</text>
  <text x="800" y="450" text-anchor="middle" class="tag">EVENT-DRIVEN HOSPITAL DEFENSE PLATFORM</text>
  <text x="800" y="485" text-anchor="middle" class="small">Organs · Engines · Events · Containment · Accountability</text>
</svg>
