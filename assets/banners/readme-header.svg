  <text x="450" y="142" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="16" fill="#9fb4c7" opacity="0.92">
        LIVE SECURITY CONTROL PLANE
