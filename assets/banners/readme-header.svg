  <rect width="900" height="200" fill="#070b12"/>
  <path d="M0 160 H900" stroke="#0b2a33" stroke-width="2" opacity="0.55"/>

  <text x="450" y="92" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="54" font-weight="800"
