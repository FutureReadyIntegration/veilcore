<svg xmlns="http://www.w3.org/2000/svg"
     width="900"
     height="560"
     viewBox="0 0 900 560"
     role="img"
     aria-labelledby="title desc">

  <title id="title">Compliance Dashboard</title>
  <desc id="desc">VeilCore-grade animated holographic compliance dashboard.</desc>

  <defs>
    <!-- ================= STYLES ================= -->
    <style>
      svg { font-family: "Noto Sans", Arial, sans-serif; }

      .bg { fill: #071026; }
      .vignette { fill: url(#vign); opacity:0.4; }

      .header-title {
        fill:#E6F7FF;
        font-weight:700;
        font-size:20px;
        filter:url(#textGlow);
      }

      .header-sub { fill:#9FBEDB; font-size:12px; }

      .card {
        fill: rgba(255,255,255,0.05);
        stroke: rgba(0,229,255,0.35);
        stroke-width:1;
        filter: url(#cardGlow);
      }

      .framework {
        fill:#EAF6FF;
        font-size:14px;
        font-weight:600;
        filter:url(#textGlow);
      }

      .engine { fill:#9FBEDB; font-size:11px; }

      .percent {
        fill:#FFFFFF;
        font-size:26px;
        font-weight:800;
        filter:url(#strongGlow);
        animation: percentPulse 3s ease-in-out infinite;
      }

      .ring-bg {
        stroke: rgba(255,255,255,0.1);
        stroke-width:10;
        fill:none;
      }

      .ring {
        stroke-linecap:round;
        stroke-width:10;
        fill:none;
        filter:url(#ringGlow);
        animation: ringSweep 6s linear infinite;
        transform-origin: center;
      }

      .ring.inner {
        stroke-width:6;
        opacity:0.6;
        animation: ringSweepReverse 10s linear infinite;
      }

      .scanline {
        animation: scan 4s linear infinite;
      }

      @keyframes ringSweep {
        from { stroke-dashoffset:314; }
        to   { stroke-dashoffset:0; }
      }

      @keyframes ringSweepReverse {
        from { stroke-dashoffset:0; }
        to   { stroke-dashoffset:314; }
      }

      @keyframes percentPulse {
        0%,100% { opacity:0.9; }
        50% { opacity:1; }
      }

      @keyframes scan {
        0% { transform: translateY(0); opacity:0; }
        10% { opacity:0.25; }
        90% { opacity:0.25; }
        100% { transform: translateY(560px); opacity:0; }
      }
    </style>

    <!-- ================= GRADIENTS ================= -->
    <radialGradient id="vign" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#0b2540" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#071026" stop-opacity="1"/>
    </radialGradient>

    <linearGradient id="grad1" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#00FFD5"/>
      <stop offset="50%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#FF4D6D"/>
    </linearGradient>

    <linearGradient id="grad2" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="50%" stop-color="#00FFD5"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>

    <linearGradient id="grad3" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#FF4D6D"/>
      <stop offset="50%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#00FFD5"/>
    </linearGradient>

    <!-- ================= FILTERS ================= -->
    <filter id="ringGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="cardGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ================= BACKGROUND ================= -->
  <rect width="900" height="560" class="bg"/>
  <rect width="900" height="560" class="vignette"/>
  <rect class="scanline" x="0" y="0" width="900" height="3" fill="rgba(0,229,255,0.45)"/>

  <!-- ================= HEADER ================= -->
  <text x="40" y="50" class="header-title">Compliance Coverage</text>
  <text x="40" y="75" class="header-sub">HIPAA · HITRUST · SOC 2 · FedRAMP · ASVS</text>

  <!-- ================= CARD 1 ================= -->
  <rect x="40" y="110" width="240" height="200" class="card"/>
  <text x="60" y="150" class="framework">HIPAA Security Rule</text>
  <text x="60" y="175" class="engine">ShieldLaw Engine</text>

  <circle cx="160" cy="240" r="50" class="ring-bg"/>
  <circle cx="160" cy="240" r="50" class="ring" stroke="url(#grad1)" stroke-dasharray="314" stroke-dashoffset="0"/>
  <circle cx="160" cy="240" r="38" class="ring inner" stroke="url(#grad1)" stroke-dasharray="239" stroke-dashoffset="0"/>
  
  <text x="160" y="250" text-anchor="middle" class="percent">100%</text>

  <!-- ================= CARD 2 ================= -->
  <rect x="330" y="110" width="240" height="200" class="card"/>
  <text x="350" y="150" class="framework">SOC 2 Type II</text>
  <text x="350" y="175" class="engine">TrustForge Engine</text>

  <circle cx="450" cy="240" r="50" class="ring-bg"/>
  <circle cx="450" cy="240" r="50" class="ring" stroke="url(#grad2)" stroke-dasharray="314"/>
  <circle cx="450" cy="240" r="38" class="ring inner" stroke="url(#grad2)" stroke-dasharray="239"/>

  <text x="450" y="250" text-anchor="middle" class="percent">97.4%</text>

  <!-- ================= CARD 3 ================= -->
  <rect x="620" y="110" width="240" height="200" class="card"/>
  <text x="640" y="150" class="framework">HITRUST CSF v11</text>
  <text x="640" y="175" class="engine">AuditIron Engine</text>

  <circle cx="740" cy="240" r="50" class="ring-bg"/>
  <circle cx="740" cy="240" r="50" class="ring" stroke="url(#grad3)" stroke-dasharray="314"/>
  <circle cx="740" cy="240" r="38" class="ring inner" stroke="url(#grad3)" stroke-dasharray="239"/>
  <text x="740" y="250" text-anchor="middle" class="percent">100%</text>

  <!-- ═══ ROW 2: FedRAMP · ASVS 5.0 ═══ -->

  <linearGradient id="fedrampGrad" x1="0%" x2="100%" xmlns="http://www.w3.org/2000/svg">
    <stop offset="0%" stop-color="#FF4D6D"/>
    <stop offset="50%" stop-color="#FFFFFF"/>
    <stop offset="100%" stop-color="#3388FF"/>
  </linearGradient>

  <linearGradient id="asvsGrad" x1="0%" x2="100%" xmlns="http://www.w3.org/2000/svg">
    <stop offset="0%" stop-color="#00FF6A"/>
    <stop offset="100%" stop-color="#00E5FF"/>
  </linearGradient>

  <!-- FedRAMP Card -->
  <rect x="185" y="340" width="240" height="200" class="card"/>
  <text x="305" y="380" text-anchor="middle" class="framework">FedRAMP NIST 800-53</text>
  <text x="305" y="405" text-anchor="middle" class="engine">IronFlag Engine</text>

  <circle cx="305" cy="470" r="50" class="ring-bg"/>
  <circle cx="305" cy="470" r="50" class="ring" stroke="url(#fedrampGrad)" stroke-dasharray="314" stroke-dashoffset="0"/>
  <circle cx="305" cy="470" r="38" class="ring inner" stroke="url(#fedrampGrad)" stroke-dasharray="239" stroke-dashoffset="0"/>
  <text x="305" y="480" text-anchor="middle" class="percent">100%</text>

  <!-- ASVS 5.0 Card -->
  <rect x="475" y="340" width="240" height="200" class="card"/>
  <text x="595" y="380" text-anchor="middle" class="framework">OWASP ASVS 5.0</text>
  <text x="595" y="405" text-anchor="middle" class="engine">345 Controls · 17 Domains</text>

  <circle cx="595" cy="470" r="50" class="ring-bg"/>
  <circle cx="595" cy="470" r="50" class="ring" stroke="url(#asvsGrad)" stroke-dasharray="314" stroke-dashoffset="0"/>
  <circle cx="595" cy="470" r="38" class="ring inner" stroke="url(#asvsGrad)" stroke-dasharray="239" stroke-dashoffset="0"/>
  <text x="595" y="480" text-anchor="middle" class="percent">100%</text>

</svg>
