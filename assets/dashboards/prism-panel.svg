<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#0f1b2e"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #e6f7ff; letter-spacing: 2px; }
      .sub { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #7baac4; letter-spacing: 1px; }
      .label { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #dff7ff; letter-spacing: 1px; }
      .body { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #9fc7dd; }
      .tiny { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #7baac4; letter-spacing: 1px; }
      .ok { fill: #00ff6a; font: 700 14px 'Segoe UI', Arial, sans-serif; }
      .warn { fill: #fbbf24; font: 700 14px 'Segoe UI', Arial, sans-serif; }
      .crit { fill: #ff4d6d; font: 700 14px 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="70" y="70" class="title">PRISM COMMAND PANEL</text>
  <text x="70" y="102" class="sub">Live event-driven awareness for VeilCore beta-foundation runtime</text>

  <!-- header chips -->
  <rect x="1180" y="40" width="140" height="42" rx="21" fill="none" stroke="#00e5ff" stroke-width="2"/>
  <text x="1250" y="67" text-anchor="middle" class="tiny">/EVENTS LIVE</text>
  <rect x="1340" y="40" width="180" height="42" rx="21" fill="none" stroke="#00ff6a" stroke-width="2"/>
  <text x="1430" y="67" text-anchor="middle" class="tiny">DESKTOP CONNECTED</text>

  <!-- left stats -->
  <rect x="60" y="150" width="270" height="120" rx="22" fill="#111827" stroke="#1e3a4a" stroke-width="2"/>
  <text x="95" y="192" class="label">ORGANS</text>
  <text x="95" y="238" style="font:700 40px 'Segoe UI', Arial, sans-serif; fill:#00e5ff;">80</text>
  <text x="95" y="262" class="body">architecture mapped</text>

  <rect x="360" y="150" width="270" height="120" rx="22" fill="#111827" stroke="#1e3a4a" stroke-width="2"/>
  <text x="395" y="192" class="label">EVENTS</text>
  <text x="395" y="238" style="font:700 40px 'Segoe UI', Arial, sans-serif; fill:#00ff6a;">LIVE</text>
  <text x="395" y="262" class="body">stream active</text>

  <rect x="660" y="150" width="270" height="120" rx="22" fill="#111827" stroke="#1e3a4a" stroke-width="2"/>
  <text x="695" y="192" class="label">RUNTIME</text>
  <text x="695" y="238" style="font:700 40px 'Segoe UI', Arial, sans-serif; fill:#fbbf24;">BETA</text>
  <text x="695" y="262" class="body">foundation stable</text>

  <!-- center mesh panel -->
  <rect x="60" y="320" width="900" height="500" rx="26" fill="#0d1522" stroke="#1e3a4a" stroke-width="2"/>
  <text x="100" y="365" class="label">SUBSYSTEM MESH</text>
  <text x="100" y="392" class="body">organs • engines • event propagation • containment visibility</text>

  <!-- mesh -->
  <g opacity="0.7">
    <line x1="260" y1="520" x2="470" y2="450" stroke="url(#line)" stroke-width="3"/>
    <line x1="470" y1="450" x2="680" y2="520" stroke="url(#line)" stroke-width="3"/>
    <line x1="470" y1="450" x2="470" y2="650" stroke="url(#line)" stroke-width="3"/>
    <line x1="260" y1="520" x2="470" y2="650" stroke="url(#line)" stroke-width="3"/>
    <line x1="680" y1="520" x2="470" y2="650" stroke="url(#line)" stroke-width="3"/>
    <line x1="470" y1="450" x2="760" y2="430" stroke="#fbbf24" stroke-width="3" stroke-opacity="0.7"/>
  </g>

  <g>
    <circle cx="260" cy="520" r="22" fill="#111827" stroke="#00e5ff" stroke-width="3"/>
    <text x="260" y="526" text-anchor="middle" class="tiny">ML</text>

    <circle cx="470" cy="450" r="22" fill="#111827" stroke="#00e5ff" stroke-width="3"/>
    <text x="470" y="456" text-anchor="middle" class="tiny">PRISM</text>

    <circle cx="680" cy="520" r="22" fill="#111827" stroke="#00e5ff" stroke-width="3"/>
    <text x="680" y="526" text-anchor="middle" class="tiny">PHYS</text>

    <circle cx="470" cy="650" r="22" fill="#111827" stroke="#3b82f6" stroke-width="3"/>
    <text x="470" y="656" text-anchor="middle" class="tiny">EVENTS</text>

    <circle cx="760" cy="430" r="22" fill="#111827" stroke="#fbbf24" stroke-width="3"/>
    <text x="760" y="436" text-anchor="middle" class="tiny">CORE</text>
  </g>

  <circle cx="260" cy="520" r="22" fill="none" stroke="#00e5ff" stroke-opacity="0.35" stroke-width="3">
    <animate attributeName="r" values="22;36;22" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0;0.35" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="520" r="22" fill="none" stroke="#00e5ff" stroke-opacity="0.35" stroke-width="3">
    <animate attributeName="r" values="22;36;22" dur="2.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0;0.35" dur="2.9s" repeatCount="indefinite"/>
  </circle>

  <!-- right event panel -->
  <rect x="1010" y="150" width="530" height="670" rx="26" fill="#0d1522" stroke="#1e3a4a" stroke-width="2"/>
  <text x="1050" y="195" class="label">LIVE EVENT STREAM</text>
  <text x="1050" y="222" class="body">current runtime examples from beta-foundation event flow</text>

  <rect x="1045" y="260" width="460" height="82" rx="18" fill="#111827" stroke="#ff4d6d" stroke-width="2"/>
  <text x="1070" y="292" class="crit">CRITICAL</text>
  <text x="1070" y="320" class="body">physical.camera_feed_lost</text>
  <text x="1070" y="342" class="body">Feed lost from Server Room A</text>

  <rect x="1045" y="370" width="460" height="82" rx="18" fill="#111827" stroke="#ff4d6d" stroke-width="2"/>
  <text x="1070" y="402" class="crit">CRITICAL</text>
  <text x="1070" y="430" class="body">physical.sensor_triggered</text>
  <text x="1070" y="452" class="body">motion triggered at Server Room A</text>

  <rect x="1045" y="480" width="460" height="82" rx="18" fill="#111827" stroke="#fbbf24" stroke-width="2"/>
  <text x="1070" y="512" class="warn">WARNING</text>
  <text x="1070" y="540" class="body">engine.degraded</text>
  <text x="1070" y="562" class="body">DeepSentinel degraded</text>

  <rect x="1045" y="590" width="460" height="82" rx="18" fill="#111827" stroke="#00ff6a" stroke-width="2"/>
  <text x="1070" y="622" class="ok">INFO</text>
  <text x="1070" y="650" class="body">engine.restarted</text>
  <text x="1070" y="672" class="body">DeepSentinel restarted</text>

  <text x="1050" y="760" class="tiny">canonical api: veilcore/veil/api.py</text>
  <text x="1050" y="786" class="tiny">desktop: scripts/veilcore_desktop.py</text>
</svg>
