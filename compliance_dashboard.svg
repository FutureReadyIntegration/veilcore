<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Compliance Dashboard">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#0f1724"/>
      <stop offset="1" stop-color="#071026"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#7b61ff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <style>
      .title { font: 700 22px/1 "Inter", "Segoe UI", Roboto, sans-serif; fill:#e6eefc; }
      .subtitle { font: 500 13px/1 "Inter", sans-serif; fill:#9fb0d6; }
      .card-title { font: 700 14px/1 "Inter", sans-serif; fill:#0b1220; }
      .engine { font: 600 12px/1 "Inter", sans-serif; fill:#0b1220; }
      .percent { font: 800 18px/1 "Inter", sans-serif; fill:#0b1220; }
      .label { font: 600 12px/1 "Inter", sans-serif; fill:#cbd7ee; }
      .small { font: 400 11px/1 "Inter", sans-serif; fill:#9fb0d6; }
      .muted { fill:#7f98bf; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <g transform="translate(40,28)">
    <rect x="0" y="0" rx="12" ry="12" width="1120" height="84" fill="#071428" opacity="0.85" filter="url(#softShadow)"/>
    <text x="28" y="34" class="title">COMPLIANCE DASHBOARD</text>
    <text x="28" y="58" class="subtitle">Live coverage snapshot — engines and rule counts</text>
    <g transform="translate(980,12)">
      <rect x="0" y="0" rx="8" ry="8" width="120" height="60" fill="#0b1220" opacity="0.6"/>
      <text x="12" y="28" class="small">Updated</text>
      <text x="12" y="46" class="small" fill="#dbeeff">Now</text>
    </g>
  </g>

  <g transform="translate(40,130)">
    <text x="18" y="0" class="label">Framework</text>
    <text x="420" y="0" class="label">Coverage</text>
    <text x="620" y="0" class="label">Engine</text>

    <!-- Row 1 -->
    <g transform="translate(0,18)">
      <rect x="0" y="8" rx="12" ry="12" width="1120" height="72" fill="#0f1a2a" opacity="0.85"/>
      <g transform="translate(18,36)">
        <text class="card-title" x="0" y="0">🏥 HIPAA Security Rule</text>
        <rect x="320" y="-14" width="260" height="18" rx="9" fill="#0b1220" opacity="0.6"/>
        <rect x="320" y="-14" width="260" height="18" rx="9" fill="url(#barGrad)" />
        <text x="600" y="0" class="percent">100.0%</text>
        <text x="720" y="0" class="engine">ShieldLaw (59/59)</text>
      </g>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0,106)">
      <rect x="0" y="8" rx="12" ry="12" width="1120" height="72" fill="#0f1a2a" opacity="0.85"/>
      <g transform="translate(18,36)">
        <text class="card-title" x="0" y="0">🔒 HITRUST CSF v11</text>
        <rect x="320" y="-14" width="260" height="18" rx="9" fill="#0b1220" opacity="0.6"/>
        <rect x="320" y="-14" width="260" height="18" rx="9" fill="url(#barGrad)" />
        <text x="600" y="0" class="percent">100.0%</text>
        <text x="720" y="0" class="engine">TrustForge (32/32)</text>
