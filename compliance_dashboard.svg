      <g transform="translate(18,36)">
        <text class="card-title" x="0" y="0">🇺🇸 FedRAMP Moderate</text>
        <rect x="320" y="-14" width="260" height="18" rx="9" fill="#0b1220" opacity="0.6"/>
        <rect x="320" y="-14" width="260" height="18" rx="9" fill="url(#barGrad)" />
        <text x="600" y="0" class="percent">100.0%</text>
        <text x="720" y="0" class="engine">IronFlag (60/60)</text>
      </g>
    </g>

    <!-- Row 6 -->
    <g transform="translate(0,458)">
      <rect x="0" y="8" rx="12" ry="12" width="1120" height="72" fill="#0f1a2a" opacity="0.85"/>
      <g transform="translate(18,36)">
        <text class="card-title" x="0" y="0">🇺🇸 FedRAMP High</text>
        <rect x="320" y="-14" width="260" height="18" rx="9" fill="#0b1220" opacity="0.6"/>
        <rect x="320" y="-14" width="260" height="18" rx="9" fill="url(#barGrad)" />
        <text x="600" y="0" class="percent">100.0%</text>
        <text x="720" y="0" class="engine">IronFlag (60/60)</text>
      </g>
    </g>

    <!-- Row 7 -->
    <g transform="translate(0,546)">
      <rect x="0" y="8" rx="12" ry="12" width="1120" height="72" fill="#0f1a2a" opacity="0.85"/>
      <g transform="translate(18,36)">
        <text class="card-title" x="0" y="0">📜 HITRUST e1 Ready</text>
        <rect x="320" y="-14" width="260" height="18" rx="9" fill="#0b1220" opacity="0.6"/>
        <rect x="320" y="-14" width="260" height="18" rx="9" fill="url(#barGrad)" />
        <text x="600" y="0" class="percent">100.0%</text>
        <text x="720" y="0" class="engine">CertForge (44/44)</text>
      </g>
    </g>

