      <g transform="translate(18,36)">
        <text class="card-title" x="0" y="0">📋 SOC 2 Type II</text>
        <rect x="320" y="-14" width="260" height="18" rx="9" fill="#0b1220" opacity="0.6"/>
        <rect x="320" y="-14" width="256.36" height="18" rx="9" fill="url(#barGrad)" />
        <text x="600" y="0" class="percent">98.6%</text>
        <text x="720" y="0" class="engine">AuditIron (34/35)</text>
