name: guardian
tier: 2
glyph: "🛡️"
description: |
  Protective organ responsible for monitoring system integrity, enforcing
  boundaries, and preventing unauthorized access or behavior.

entrypoint: "veil.organs.guardian.main"

logging:
  file: "/var/log/veil/guardian.log"
  level: "INFO"

storage:
  path: "/var/lib/veil/guardian"
  retention_days: 90

health:
  enabled: true
  interval_seconds: 30

allowed:
  - "user"
