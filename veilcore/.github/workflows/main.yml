# .github/workflows/main.yml
# ─────────────────────────────────────────────────────────────
# VeilCore Continuous Integration Pipeline
#
# Runs on every push and PR.  Free for public repos.
# Covers:
#   1. Gateway endpoint tests  (test_gateway.py)
#   2. Authentication tests    (test_auth.py)
#   3. Security tests          (test_security.py)
#   4. Compliance mapping      (test_compliance.py)
#   5. Organ registry          (test_organs.py)
# ─────────────────────────────────────────────────────────────

name: VeilCore CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Allow manual runs from Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout

      - name: Run test suite
        run: |
          pytest tests/ \
            -v \
            --timeout=30 \
            --tb=short \
            -x \
            --junitxml=test-results.xml
        env:
          VEIL_API_KEY: "vc_aceea537c874533b85bdb56d3e7835db40a1cc32eff8024b"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          pip install bandit safety

      - name: Bandit security scan (gateway)
        run: |
          bandit -r scripts/veilcore_gateway.py \
            -f json -o bandit-report.json \
            --severity-level medium \
            || true
          bandit -r scripts/veilcore_gateway.py --severity-level medium

      - name: Check dependencies for vulnerabilities
        run: |
          # VeilCore is stdlib-only, but check if requirements.txt exists
          if [ -f requirements.txt ]; then
            safety check -r requirements.txt
          else
            echo "No requirements.txt — stdlib only (no vulnerable deps)"
          fi

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json

  load-test:
    name: Load Test (Smoke)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install locust

      - name: Start gateway
        run: |
          python scripts/veilcore_gateway.py &
          sleep 2
          curl -sf -H "X-API-Key: vc_aceea537c874533b85bdb56d3e7835db40a1cc32eff8024b" \
            http://localhost:9444/health
          echo "Gateway running"

      - name: Run load test (30s, 20 users)
        run: |
          locust -f tests/locustfile.py \
            --headless \
            -u 20 -r 5 -t 30s \
            --host http://localhost:9444 \
            --csv=load-results \
            --exit-code-on-error 1

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: load-results_*.csv
