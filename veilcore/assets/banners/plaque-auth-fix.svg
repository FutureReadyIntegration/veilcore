<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">

<style>
.title { font-family: monospace; font-size: 34px; fill: #00f0ff; font-weight: bold; }
.subtitle { font-family: monospace; font-size: 20px; fill: #8aa0b5; }
.label { font-family: monospace; font-size: 18px; fill: #ffd166; }
.small { font-family: monospace; font-size: 16px; fill: #9fb3c8; }
.status { font-family: monospace; font-size: 20px; fill: #ffd166; font-weight: bold; }
</style>

<!-- background -->
<rect x="2" y="2" width="1196" height="256" rx="18"
fill="#050b16"
stroke="#ffd166"
stroke-width="3"/>

<!-- title -->
<text x="40" y="70" class="title">VEILCORE · SECURITY PLAQUE</text>

<text x="40" y="110" class="subtitle">
Invocation resource classification flaw resolved
</text>

<!-- status -->
<rect x="860" y="40" width="300" height="60" rx="30"
fill="none"
stroke="#ffd166"
stroke-width="3"/>

<text x="900" y="78" class="status">
BOUNDARY: RESTORED
</text>

<!-- trace -->
<line x1="40" y1="170" x2="1160" y2="170"
stroke="#ffd166"
stroke-width="2"/>

<!-- nodes -->
<circle cx="180" cy="170" r="10" fill="#ffd166"/>
<circle cx="480" cy="170" r="10" fill="#ffd166"/>
<circle cx="780" cy="170" r="10" fill="#ffd166"/>
<circle cx="1080" cy="170" r="10" fill="#ffd166"/>

<!-- labels -->
<text x="90" y="210" class="small">Invoke Request</text>
<text x="410" y="210" class="small">Resource Declared</text>
<text x="710" y="210" class="small">Guardian Authorization</text>
<text x="1020" y="210" class="small">Execution Allowed</text>

<!-- live indicator -->
<circle cx="1120" cy="80" r="7" fill="#ffd166"/>
<text x="1140" y="86" class="label">SECURED</text>

</svg>
