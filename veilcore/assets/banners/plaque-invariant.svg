<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">

<style>
.title { font-family: monospace; font-size: 34px; fill: #00f0ff; font-weight: bold; }
.subtitle { font-family: monospace; font-size: 20px; fill: #8aa0b5; }
.label { font-family: monospace; font-size: 18px; fill: #00ffa6; }
.small { font-family: monospace; font-size: 16px; fill: #9fb3c8; }
.status { font-family: monospace; font-size: 20px; fill: #00ffa6; font-weight: bold; }
</style>

<!-- background -->
<rect x="2" y="2" width="1196" height="256" rx="18"
fill="#050b16"
stroke="#00f0ff"
stroke-width="3"/>

<!-- title -->
<text x="40" y="70" class="title">VEILCORE · INVARIANT PLAQUE</text>

<text x="40" y="110" class="subtitle">
Authorization integrity invariant restored and enforced
</text>

<!-- invariant status -->
<rect x="880" y="40" width="280" height="60" rx="30"
fill="none"
stroke="#00ffa6"
stroke-width="3"/>

<text x="920" y="78" class="status">
INVARIANT: PRESERVED
</text>

<!-- trace line -->
<line x1="40" y1="170" x2="1160" y2="170"
stroke="#00f0ff"
stroke-width="2"/>

<!-- nodes -->
<circle cx="180" cy="170" r="10" fill="#00ffa6"/>
<circle cx="480" cy="170" r="10" fill="#00ffa6"/>
<circle cx="780" cy="170" r="10" fill="#00ffa6"/>
<circle cx="1080" cy="170" r="10" fill="#00ffa6"/>

<!-- labels -->
<text x="120" y="210" class="small">Admission</text>
<text x="420" y="210" class="small">Guardian</text>
<text x="720" y="210" class="small">Firewall</text>
<text x="1020" y="210" class="small">Organs</text>

<!-- live indicator -->
<circle cx="1120" cy="80" r="7" fill="#00ffa6"/>
<text x="1140" y="86" class="label">LIVE</text>

</svg>
