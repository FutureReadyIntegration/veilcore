<!DOCTYPE html>
<html>
<head>
    <title>Veil Unleashed Cockpit</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d0d;
            color: #e6e6e6;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #spacer {
            height: 40px;
            background: #0d0d0d;
        }
        #topnav {
            display: flex;
            justify-content: center;
            background: #1a1a1a;
            padding: 16px 0;
            border-bottom: 2px solid #333;
        }
        .tab {
            margin: 0 14px;
            padding: 12px 18px;
            cursor: pointer;
            background: #262626;
            border-radius: 6px;
            transition: background 0.2s;
            font-size: 15px;
        }
        .tab:hover {
            background: #333;
        }
        #header {
            text-align: center;
            padding: 24px;
            font-size: 26px;
            font-weight: bold;
            border-bottom: 2px solid #333;
            background: #111;
        }
        #content-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
            overflow-y: auto;
        }
        #content {
            width: 75%;
            max-width: 1000px;
        }
        pre {
            background: #000;
            padding: 24px;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 15px;
            white-space: pre-wrap;
            line-height: 1.45;
        }
    </style>
</head>
<body>
<div id="spacer"></div>
<div id="topnav">
    <div class="tab" onclick="load('/health/', 'Health')">Health</div>
    <div class="tab" onclick="load('/state/', 'State Vector')">State</div>
    <div class="tab" onclick="load('/organs/', 'Organs')">Organs</div>
    <div class="tab" onclick="load('/telemetry/', 'Telemetry')">Telemetry</div>
    <div class="tab" onclick="load('/telemetry/live', 'Telemetry Live')">Live</div>
    <div class="tab" onclick="load('/chronicle/', 'Chronicle')">Chronicle</div>
    <div class="tab" onclick="load('/timeline/', 'Timeline')">Timeline</div>
    <div class="tab" onclick="load('/analytics/', 'Analytics')">Analytics</div>
    <div class="tab" onclick="load('/operator-presence/', 'Operator')">Operator</div>
    <div class="tab" onclick="load('/zombie-sweeper/status', 'Sweeper')">Sweeper</div>
</div>
<div id="header">Veil Unleashed Cockpit</div>
<div id="content-wrapper">
    <div id="content">
        <pre>Select a section above to begin.</pre>
    </div>
</div>
<script>
function load(endpoint, title) {
    document.getElementById("header").textContent = "Veil Unleashed — " + title;
    fetch(endpoint)
        .then(r => r.json())
        .then(j => {
            document.getElementById("content").innerHTML =
                "<pre>" + JSON.stringify(j, null, 2) + "</pre>";
        })
        .catch(err => {
            document.getElementById("content").innerHTML =
                "<pre>Error: " + err + "</pre>";
        });
}
</script>
</body>
</html>
