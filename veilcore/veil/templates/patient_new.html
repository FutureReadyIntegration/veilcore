{% extends "base.html" %}
{% block content %}
  <h1>Add Patient</h1>

  <form class="form" method="post" action="/patients/new">
    <label>
      Name
      <input name="name" placeholder="Full name" required />
    </label>

    <label>
      Age
      <input name="age" type="number" min="0" max="130" required />
    </label>

    <button class="btn" type="submit">Create</button>
  </form>
{% endblock %}
