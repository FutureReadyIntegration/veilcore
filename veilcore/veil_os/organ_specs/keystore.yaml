name: keystore
version: 1.0
tier: security
glyph: "🗝️"
technical_role: key_management
symbolic_role: keeper_of_keys
description: Cryptographic key management and secure storage.
inputs:
  - source: /opt/veil_os/sockets/keystore.sock
    format: json
outputs:
  - path: /opt/veil_os/ledger/keystore.log
    format: jsonl
triggers:
  - type: key_request
  - type: rotation_due
  - type: key_compromise
actions:
  - type: generate
  - type: store
  - type: rotate
  - type: revoke
dependencies:
  - vault
  - audit
affirmation: I guard the keys that guard all else.
