name: relay
version: 1.0
tier: network
glyph: "📡"
technical_role: message_relay
symbolic_role: messenger
description: Secure message relay between network segments.
inputs:
  - source: /opt/veil_os/sockets/relay.sock
    format: json
outputs:
  - path: /opt/veil_os/ledger/relay.log
    format: jsonl
triggers:
  - type: relay_request
  - type: circuit_break
actions:
  - type: forward
  - type: buffer
  - type: retry
dependencies:
  - bridge
  - fabric
affirmation: I carry messages across the divide.
