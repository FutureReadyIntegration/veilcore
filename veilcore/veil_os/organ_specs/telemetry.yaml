name: telemetry
version: 1.0
description: |
  The telemetry organ collects performance metrics and system vitals. It emits periodic reports for observability and trend analysis.

inputs: []

outputs:
  - path: /opt/veil_os/ledger/telemetry.log
    format: jsonl

triggers:
  - type: time_interval
    interval_seconds: 60

actions:
  - type: collect_metrics
  - type: emit_report

affirmation: "What is measured can be improved."
